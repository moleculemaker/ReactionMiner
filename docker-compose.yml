networks:
  reactionminer:

volumes:
  huggingface:

services:

  # s2orc-doc2json via pdf2text + ReactionMiner
  reactionminer:
    image: moleculemaker/reactionminer:combined
    build:
      context: .
    env_file:
      - .env
    networks:
      - reactionminer
    volumes:
      # Uncomment to map in source code for live dev
      #- .:/workspace

      # HuggingFace API token
      - ./.huggingface/token:/root/.cache/token

      # Input files
      - ./inputs:/workspace/10test/

      # Output files
      - ./results:/workspace/results/
    depends_on:
      grobid:
        condition: service_healthy


  # See https://grobid.readthedocs.io/en/latest/Grobid-docker/
  grobid:
    image: grobid/grobid:0.7.3
    networks:
    - reactionminer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
